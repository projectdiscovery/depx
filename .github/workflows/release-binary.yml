name: 🎉 Release Binary

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: projectdiscovery/actions/setup/go@v1

      - name: Create release on GitHub
        uses: projectdiscovery/actions/goreleaser@v1
        with:
          release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
